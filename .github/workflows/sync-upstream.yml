name: Sync fork with upstream

on:
  schedule:
    - cron: "0 11 * * 1,4"   # Lunes y jueves 11:00 UTC = 08:00 Chile
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@main
        with:
          upstream_repository: DavidPobleteUV/Procesamiento_climatico
          upstream_branch: main
          target_branch: main

      - name: Show summary
        run: |
          echo "Sincronización completada. Revisa el log de este job para detalles."
