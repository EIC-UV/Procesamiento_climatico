name: Sync fork with upstream

on:
  schedule:
    # Corre los lunes y jueves 06:17 (Chile, GMT-3) ≈ 09:17 UTC
    - cron: "17 9 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: DavidPobleteUV/Procesamiento_climatico
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show summary
        run: |
          echo "Sincronización completada. Revisa el log de este job para detalles."
